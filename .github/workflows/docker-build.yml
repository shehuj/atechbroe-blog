name: Docker Build, Test & Publish

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["main"]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/atechbroe-blog
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:
  # ── 1. Build & Test ────────────────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (load locally for testing)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: atechbroe-blog:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start test container
        run: |
          docker run -d \
            --name ghost-test \
            -p 2368:2368 \
            -e url=http://localhost:2368 \
            -e database__client=sqlite3 \
            -e database__connection__filename=/var/lib/ghost/content/data/ghost.db \
            atechbroe-blog:test

      - name: Wait for healthy status
        run: |
          echo "Waiting for Ghost to become healthy..."
          for i in $(seq 1 24); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' ghost-test 2>/dev/null || echo "starting")
            echo "[$i/24] $STATUS"
            [ "$STATUS" = "healthy" ] && break
            [ $i -eq 24 ] && { echo "Timed out waiting for healthy status"; docker logs ghost-test; exit 1; }
            sleep 5
          done

      - name: Verify non-root user
        run: |
          USER=$(docker exec ghost-test whoami)
          echo "Running as: $USER"
          [ "$USER" = "node" ] || { echo "ERROR: expected 'node', got '$USER'"; exit 1; }

      - name: Verify HTTP 200
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:2368/)
          echo "HTTP status: $CODE"
          [ "$CODE" = "200" ] || { echo "ERROR: expected 200, got $CODE"; docker logs ghost-test; exit 1; }

      - name: Cleanup
        if: always()
        run: docker stop ghost-test && docker rm ghost-test

  # ── 2. Publish to Docker Hub ────────────────────────────────────
  publish:
    runs-on: ubuntu-latest
    needs: build-and-test
    # Only publish on push to main or a version tag — not on PRs
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Generate image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            # branch push → atechbroe-blog:main
            type=ref,event=branch
            # version tag v1.2.3 → :1.2.3 and :1.2
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # always tag the commit SHA for traceability
            type=sha,prefix=sha-

      - name: Build and push to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
